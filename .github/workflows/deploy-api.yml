name: CI/CD AniFlow | Deploy API

on:
  workflow_dispatch: 

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: AnimeApp.API/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api_animeapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    runs-on: ubuntu-latest
    needs: build-and-push-api
    environment: production 

    steps:
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd aniflow
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml pull api
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d api
            docker image prune -f