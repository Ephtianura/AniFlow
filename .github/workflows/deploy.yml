name: CI/CD AniFlow Production

on:
  workflow_dispatch:

jobs:
  build-and-push:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build and Push API Image
          uses: docker/build-push-action@v5
          with:
            context: .
            file: AnimeApp.API/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/api_animeapp:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: Build and Push Frontend Image
          uses: docker/build-push-action@v5
          with:
            context: ./AnimeApp.Frontend/animeapp
            file: ./AnimeApp.Frontend/animeapp/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/frontend_animeapp:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
              NEXT_PUBLIC_HUB_URL=${{ secrets.HUB_URL }}
              NEXT_PUBLIC_CDN_URL=${{ secrets.CDN_URL }}
              DISABLE_CHECKS=true

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push 
    environment: production 

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd aniflow

            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml pull api frontend

            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d api frontend

            docker image prune -f