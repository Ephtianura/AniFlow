services:
  # Database
  postgres:
    image: postgres:16
    container_name: postgres_animeapp
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache
  redis:
    image: redis:7
    container_name: redis_animeapp
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "4gb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]

  # S3
  minio:
    image: minio/minio
    container_name: minio_animeapp
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_aniflow
    hostname: rabbitmq
    environment:
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - aniflow_rabbitmq_data:/var/lib/rabbitmq

  # Seq
  seq:
    image: datalust/seq:latest
    container_name: seq_aniflow
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMINPASSWORD}
    volumes:
      - aniflow_seq_data:/data

volumes:
  postgres_data:
  minio_data:
  aniflow_rabbitmq_data:
  aniflow_seq_data:
